<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jQuery UI Draggable - Default functionality</title>
  <!-- <link rel="stylesheet" href="//code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
  <link rel="stylesheet" href="/resources/demos/style.css"> -->
  <style>
    .ui-widget-content { width: 10px; height: 10px; padding: 0.5em; border-radius: 50%; border: 1px solid black; }
    .draggable { background-color: white }
    .draggable2 { background-color: black; border: 1px solid white; }
    #
  </style>
  <script src="https://code.jquery.com/jquery-1.12.4.js"></script>
  <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
  <script>
  $( function() {
    $( ".ui-widget-content" ).draggable();
  } );
  </script>
</head>
<body>
  <div id="canvas" style="width:700px; height: 700px; background-image: url(./tabuleiro.jpg); background-repeat: no-repeat; float: left; background-size: contain;">
  </div>

  <div class="draggable ui-widget-content">
  </div>  
  <div class="draggable ui-widget-content">
  </div>
  <div class="draggable ui-widget-content">
  </div>
  <div class="draggable ui-widget-content">
  </div>

  <div class="draggable2 ui-widget-content">
  </div>  
  <div class="draggable2 ui-widget-content">
  </div>
  <div class="draggable2 ui-widget-content">
  </div>
  <div class="draggable2 ui-widget-content">
  </div>
 
 
</body>
</html>
